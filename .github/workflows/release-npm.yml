name: Manual npm Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Semver tag to prepare, for example v0.1.0-rc.1
        required: true
        type: string
      publish_package:
        description: Publish to npm, create the release commit, and push the annotated tag
        required: true
        default: false
        type: boolean
      bootstrap_with_npm_token:
        description: One-time first-package bootstrap using the NPM_TOKEN secret; prerelease only
        required: true
        default: false
        type: boolean

permissions:
  contents: write
  id-token: write

env:
  PACKAGE_NAME: "@trustplane/auth-sdk"

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Require main
        run: |
          if [ "${GITHUB_REF_NAME}" != "main" ]; then
            echo "release workflow must run from main"
            exit 1
          fi
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          # npm trusted publishing requires npm >=11.5.1 and Node >=22.14.0.
          # Keep the PR workflow on Node 20 to cover the package runtime floor.
          node-version: 22.14.0
          cache: npm
          registry-url: https://registry.npmjs.org
      - name: Install trusted publishing npm
        run: npm install -g npm@^11.5.1
      - name: Verify trusted publishing toolchain
        run: |
          node --version
          npm --version
          node -e '
          const { execFileSync } = require("node:child_process");
          function parse(version) {
            return version.trim().replace(/^v/, "").split(".").map(Number);
          }
          function atLeast(current, required) {
            for (let i = 0; i < required.length; i += 1) {
              if (current[i] > required[i]) return true;
              if (current[i] < required[i]) return false;
            }
            return true;
          }
          const nodeVersion = parse(process.version);
          const npmVersion = parse(execFileSync("npm", ["--version"], { encoding: "utf8" }));
          if (!atLeast(nodeVersion, [22, 14, 0])) {
            console.error(`Node ${nodeVersion.join(".")} is too old for npm trusted publishing; require >= 22.14.0`);
            process.exit(1);
          }
          if (!atLeast(npmVersion, [11, 5, 1])) {
            console.error(`npm ${npmVersion.join(".")} is too old for trusted publishing; require >= 11.5.1`);
            process.exit(1);
          }
          '
      - name: Configure release git identity
        run: |
          git config user.name "Medh Mesh"
          git config user.email "maintainer@trustplane.dev"
      - name: Validate version input
        run: |
          if ! printf '%s\n' "${{ inputs.version }}" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+(-rc\.[0-9]+)?$'; then
            echo "version must look like v0.1.0 or v0.1.0-rc.1"
            exit 1
          fi
          package_version="${{ inputs.version }}"
          package_version="${package_version#v}"
          echo "PACKAGE_VERSION=$package_version" >> "$GITHUB_ENV"
      - name: Resolve npm dist-tag
        run: |
          case "$PACKAGE_VERSION" in
            *-rc.*) npm_dist_tag=rc ;;
            *) npm_dist_tag=latest ;;
          esac
          echo "NPM_DIST_TAG=$npm_dist_tag" >> "$GITHUB_ENV"
          echo "npm dist-tag: $npm_dist_tag"
      - name: Validate bootstrap mode
        if: ${{ inputs.bootstrap_with_npm_token }}
        run: |
          if [ "${{ inputs.publish_package }}" != "true" ]; then
            echo "bootstrap_with_npm_token=true requires publish_package=true"
            exit 1
          fi
          case "$PACKAGE_VERSION" in
            *-rc.*) ;;
            *)
              echo "bootstrap_with_npm_token is only allowed for prerelease versions containing -rc."
              exit 1
              ;;
          esac
          if [ -z "${NPM_TOKEN:-}" ]; then
            echo "bootstrap_with_npm_token=true requires the NPM_TOKEN GitHub Actions secret"
            exit 1
          fi
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Refuse existing remote tag
        run: |
          if git ls-remote --exit-code --tags origin "refs/tags/${{ inputs.version }}" >/dev/null 2>&1; then
            echo "tag already exists: ${{ inputs.version }}"
            exit 1
          fi
      - name: Refuse existing npm version
        run: |
          if npm view "$PACKAGE_NAME@$PACKAGE_VERSION" version >/dev/null 2>&1; then
            echo "npm version already exists: $PACKAGE_NAME@$PACKAGE_VERSION"
            exit 1
          fi
      - name: Install
        run: npm ci
      - name: Test
        run: npm test
      - name: Typecheck
        run: npm run typecheck
      - name: Build
        run: npm run build
      - name: Packed smoke
        run: npm run smoke:pack
      - name: Leak scan
        run: npm run scan:leaks
      - name: Premature wording scan
        run: npm run scan:wording
      - name: Pack dry-run
        run: npm pack --dry-run
      - name: Set package version
        run: npm version "$PACKAGE_VERSION" --no-git-tag-version
      - name: Rebuild versioned package
        run: npm run build
      - name: Pack versioned tarball
        run: |
          pack_json=$(npm pack --json)
          printf '%s\n' "$pack_json"
          tarball=$(printf '%s\n' "$pack_json" | node -e 'let data = ""; process.stdin.on("data", chunk => data += chunk); process.stdin.on("end", () => { const parsed = JSON.parse(data); console.log(parsed[0].filename); });')
          echo "TARBALL=$tarball" >> "$GITHUB_ENV"
      - name: Clean install/import smoke
        run: sh scripts/smoke-npm-tarball.sh "$TARBALL"
      - name: Dry-run summary
        if: ${{ inputs.publish_package == false }}
        run: |
          {
            echo "### npm release readiness complete"
            echo
            echo "Prepared and smoke-tested $PACKAGE_NAME@$PACKAGE_VERSION from $TARBALL."
            echo
            echo "npm dist-tag: $NPM_DIST_TAG"
            echo
            echo "publish_package=false, so this run did not create a commit, tag, npm publish, or GitHub Release."
            echo
            echo "To publish later, rerun from main with publish_package=true after npm trusted publishing is configured for this package."
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Require npm trusted publishing
        if: ${{ inputs.publish_package && !inputs.bootstrap_with_npm_token }}
        run: |
          if [ -z "${ACTIONS_ID_TOKEN_REQUEST_TOKEN:-}" ] || [ -z "${ACTIONS_ID_TOKEN_REQUEST_URL:-}" ]; then
            echo "npm trusted publishing/OIDC is not available to this job."
            echo "Configure npm trusted publishing for $PACKAGE_NAME and keep id-token: write enabled."
            exit 1
          fi
      - name: Publish package with trusted publishing
        if: ${{ inputs.publish_package && !inputs.bootstrap_with_npm_token }}
        run: npm publish "$TARBALL" --access public --provenance --tag "$NPM_DIST_TAG"
      - name: Bootstrap publish package with npm token
        if: ${{ inputs.publish_package && inputs.bootstrap_with_npm_token }}
        run: npm publish "$TARBALL" --access public --provenance --tag "$NPM_DIST_TAG"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Commit version, tag, and push
        if: ${{ inputs.publish_package }}
        run: |
          git add package.json package-lock.json
          git commit -m "Release TypeScript SDK ${{ inputs.version }}"
          git tag -a "${{ inputs.version }}" -m "TrustPlane Auth TypeScript SDK ${{ inputs.version }}"
          git push origin "HEAD:main" "refs/tags/${{ inputs.version }}"
      - name: Publish summary
        if: ${{ inputs.publish_package }}
        run: |
          {
            echo "### npm release published"
            echo
            echo "Published $PACKAGE_NAME@$PACKAGE_VERSION with provenance from $TARBALL."
            echo
            echo "npm dist-tag: $NPM_DIST_TAG"
            echo
            if [ "${{ inputs.bootstrap_with_npm_token }}" = "true" ]; then
              echo "Bootstrap token mode was used. Revoke the npm token and configure npm trusted publishing for future releases."
              echo
            fi
            echo "No GitHub Release was created by this workflow. Create a draft release in the follow-up release task after npm verification succeeds."
            echo
            echo "Recovery note: npm publish runs before git push. If npm publish fails, there is no release commit or tag to repair. If git push fails after npm publish, do not republish or overwrite npm; repair the git commit/tag publication from the same workflow commit and package version."
          } >> "$GITHUB_STEP_SUMMARY"
